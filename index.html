<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRASIL - Loja Oficial</title>
    <style>
        /* --- ESTILO GLOBAL (CSS) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            padding-bottom: 60px;
        }

        /* --- CABEÇALHO --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #e5e5e5;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            font-style: italic;
            text-decoration: none;
            color: #000;
        }

        nav a {
            text-decoration: none;
            color: #666;
            font-size: 0.85rem;
            margin-left: 20px;
            transition: color 0.2s;
        }

        nav a:hover, nav a.ativo {
            color: #000;
            font-weight: bold;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .conteudo {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 40px;
        }

        /* --- VITRINE DE PRODUTOS --- */
        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .produto-card {
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .container-foto {
            width: 100%;
            height: 380px;
            background-color: #f7f7f7;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .produto-foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .produto-card:hover .produto-foto {
            transform: scale(1.05);
        }

        .produto-info {
            padding: 15px 0;
            text-align: left;
        }

        .produto-nome {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .produto-preco {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .btn-comprar {
            width: 100%;
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-comprar:hover {
            background-color: #333333;
        }

        /* --- SEÇÃO DO CARRINHO --- */
        .carrinho-lateral {
            border: 1px solid #e5e5e5;
            padding: 20px;
            align-self: start;
            position: sticky;
            top: 100px;
        }

        .carrinho-titulo {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .lista-carrinho {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .item-carrinho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.8rem;
        }

        .item-detalhes {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .btn-remover {
            background: none;
            border: none;
            color: #ff0000;
            font-weight: bold;
            cursor: pointer;
            padding: 5px;
        }

        .carrinho-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1rem;
            border-top: 2px solid #000;
            padding-top: 15px;
            margin-bottom: 15px;
        }

        .carrinho-vazio {
            color: #999;
            font-size: 0.85rem;
            text-align: center;
            padding: 20px 0;
        }

        .btn-finalizar {
            width: 100%;
            background-color: #25d366; /* Cor verde para destaque */
            color: #ffffff;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
            display: none; /* Oculto inicialmente */
        }

        .btn-finalizar:hover {
            background-color: #1ebd59;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 992px) {
            .conteudo {
                grid-template-columns: 1fr;
            }
            .carrinho-lateral {
                position: static;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">BRASIL</a>
        <nav>
            <a href="#" class="ativo">Camisas</a>
        </nav>
    </header>

    <div class="conteudo">
        
        <main class="produtos-grid">
            
            <div class="produto-card">			
                <div class="container-foto">
					<a href="camisama.html">
                    <img src="https://tse4.mm.bing.net/th/id/OIP.QQgrpN77UEsE_oY0NowR6gHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Camisa Brasil Amarela" class="produto-foto">
					</a>
                </div>
                <div class="produto-info">
                    <p class="produto-nome">Camisa Brasil Oficial I - Amarela</p>
                    <p class="produto-preco">R$ 349,90</p>
                    <button class="btn-comprar" onclick="adicionarItem('Camisa Brasil I - Amarela', 349.90)">Adicionar ao carrinho</button>
                </div>
            </div>

            <div class="produto-card">
                <div class="container-foto">
					<a href="camisaazul.html">
                    <img src="https://cdn-blog-backend.tiendanube.com/blogs/019/4b3/eb8/d8c7226b757c8397a144c85/media/019a5b8e-a8d0-7228-b317-3e8377f2575c.jpg" alt="Camisa Brasil Azul" class="produto-foto">
					</a>
                </div>
                <div class="produto-info">
                    <p class="produto-nome">Camisa Brasil Oficial II - Azul</p>
                    <p class="produto-preco">R$ 349,90</p>
                    <button class="btn-comprar" onclick="adicionarItem('Camisa Brasil II - Azul', 349.90)">Adicionar ao carrinho</button>
                </div>
            </div>

            <div class="produto-card">
                <div class="container-foto">
					<a href="jaqueta.html">
                    <img src="https://down-br.img.susercontent.com/file/394662c553b3bf0a4356b16f9e456a21" alt="Jaqueta Corta-Vento" class="produto-foto">
					</a>
                </div>
                <div class="produto-info">
                    <p class="produto-nome">Jaqueta Corta-Vento Seleção</p>
                    <p class="produto-preco">R$ 499,90</p>
                    <button class="btn-comprar" onclick="adicionarItem('Jaqueta Corta-Vento Seleção', 499.90)">Adicionar ao carrinho</button>
                </div>
            </div>

        </main>

        <aside class="carrinho-lateral">
            <h2 class="carrinho-titulo">Seu Carrinho</h2>
            
            <ul id="lista-carrinho" class="lista-carrinho">
                <p id="carrinho-vazio" class="carrinho-vazio">Seu carrinho está vazio</p>
            </ul>

            <div class="carrinho-total">
                <span>Total:</span>
                <span id="valor-total">R$ 0,00</span>
            </div>

            <button id="btn-finalizar" class="btn-finalizar" onclick="finalizarCompra()">Finalizar Compra</button>
        </aside>

    </div>

    <script>
        // Array que vai guardar os produtos que o usuário adicionar
        let carrinho = [];

        // Função executada ao clicar em "Adicionar ao carrinho"
        function adicionarItem(nome, preco) {
            // Adiciona o produto como um objeto dentro da lista (array)
            carrinho.push({ nome: nome, preco: preco });
            
            // Renderiza novamente os itens na tela
            atualizarCarrinho();
        }

        // Função responsável por desenhar a lista atualizada na barra lateral
        function atualizarCarrinho() {
            const listaCarrinho = document.getElementById('lista-carrinho');
            const valorTotal = document.getElementById('valor-total');
            const btnFinalizar = document.getElementById('btn-finalizar');
            
            // Limpa o conteúdo atual da lista
            listaCarrinho.innerHTML = '';

            // Se a lista estiver zerada, exibe o aviso padrão e esconde o botão verde
            if (carrinho.length === 0) {
                listaCarrinho.innerHTML = '<p id="carrinho-vazio" class="carrinho-vazio">Seu carrinho está vazio</p>';
                valorTotal.innerText = 'R$ 0,00';
                btnFinalizar.style.display = 'none';
                return;
            }

            // Caso possua itens, torna o botão de finalizar visível
            btnFinalizar.style.display = 'block';

            let somaTotal = 0;

            // Percorre o array adicionando cada elemento na tela
            carrinho.forEach((item, index) => {
                somaTotal += item.preco;

                const li = document.createElement('li');
                li.className = 'item-carrinho';
                li.innerHTML = `
                    <div class="item-detalhes">
                        <strong>${item.nome}</strong>
                        <span>R$ ${item.preco.toFixed(2).replace('.', ',')}</span>
                    </div>
                    <button class="btn-remover" onclick="removerItem(${index})">X</button>
                `;
                listaCarrinho.appendChild(li);
            });

            // Formata o valor total somado
            valorTotal.innerText = `R$ ${somaTotal.toFixed(2).replace('.', ',')}`;
        }

        // Função para remover um item se o usuário clicar no botão "X"
        function removerItem(index) {
            carrinho.splice(index, 1); // Remove 1 item baseado no índice clicado
            atualizarCarrinho(); // Atualiza a tela do carrinho
        }

        // Função chamada pelo botão "Finalizar Compra"
        function finalizarCompra() {
            alert('Compra finalizada com sucesso! Obrigado por comprar na Loja Oficial.');
            carrinho = []; // Esvazia a memória do carrinho
            atualizarCarrinho(); // Reseta a interface visual
        }
    </script>
</body>
</html>
